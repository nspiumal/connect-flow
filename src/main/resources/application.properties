# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (H2 - In-Memory Database for Development)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Disable SQL script initialization (we use DataInitializer instead)
spring.sql.init.mode=never

# Logging
logging.level.root=INFO
logging.level.com.connectflow=DEBUG
logging.level.org.springframework.security=DEBUG

# Application Info
spring.application.name=connect-flow-api
app.name=Connect Flow Gold Pawn Management System
app.version=1.0.0

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=86400000

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# File Upload Configuration
app.upload.dir=./uploads/pawn-transactions
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

